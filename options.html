<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Intercept AI Settings</title>
    <style>
      body {
        width: 350px;
        background-color: #0c0a09;
        color: #fafaf9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 16px;
      }
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        border-bottom: 1px solid #292524;
        padding-bottom: 10px;
      }
      .title { font-weight: 700; font-size: 16px; }
      .section { margin-bottom: 20px; }
      .section-title {
        font-size: 12px;
        color: #a8a29e;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .toggle-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 0;
        border-bottom: 1px solid #1c1917;
      }
      .toggle-label { font-size: 13px; }
      .toggle-switch {
        position: relative;
        width: 40px;
        height: 22px;
      }
      .toggle-switch input { display: none; }
      .toggle-slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #292524;
        border-radius: 22px;
        transition: 0.2s;
      }
      .toggle-slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background: #57534e;
        border-radius: 50%;
        transition: 0.2s;
      }
      .toggle-switch input:checked + .toggle-slider { background: #10b981; }
      .toggle-switch input:checked + .toggle-slider:before {
        transform: translateX(18px);
        background: #fff;
      }
      .btn {
        width: 100%;
        padding: 10px;
        border: 1px solid #292524;
        border-radius: 8px;
        background: #1c1917;
        color: #fafaf9;
        font-size: 13px;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn:hover { background: #292524; }
      .btn-danger { border-color: #7f1d1d; color: #fca5a5; }
      .btn-danger:hover { background: #7f1d1d; color: #fff; }
      .status-badge {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 99px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .status-active {
        background: #064e3b;
        color: #10b981;
        border: 1px solid #064e3b;
      }
      .status-inactive {
        background: #7f1d1d;
        color: #fca5a5;
        border: 1px solid #7f1d1d;
      }
      .privacy-link {
        display: block;
        text-align: center;
        font-size: 11px;
        color: #57534e;
        margin-top: 16px;
        text-decoration: none;
      }
      .privacy-link:hover { color: #a8a29e; }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="title">Intercept AI</span>
      <div id="status-badge" class="status-badge status-active">Active</div>
    </div>

    <div class="section">
      <div class="section-title">Extension Status</div>
      <label class="toggle-row">
        <span class="toggle-label">Enable Protection</span>
        <label class="toggle-switch">
          <input type="checkbox" id="enable-toggle" checked />
          <span class="toggle-slider"></span>
        </label>
      </label>
    </div>

    <div class="section">
      <div class="section-title">Redaction Patterns</div>
      <label class="toggle-row">
        <span class="toggle-label">Email Addresses</span>
        <label class="toggle-switch">
          <input type="checkbox" id="pattern-email" checked />
          <span class="toggle-slider"></span>
        </label>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">Phone Numbers</span>
        <label class="toggle-switch">
          <input type="checkbox" id="pattern-phone" checked />
          <span class="toggle-slider"></span>
        </label>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">SSN</span>
        <label class="toggle-switch">
          <input type="checkbox" id="pattern-ssn" checked />
          <span class="toggle-slider"></span>
        </label>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">Credit Cards</span>
        <label class="toggle-switch">
          <input type="checkbox" id="pattern-cc" checked />
          <span class="toggle-slider"></span>
        </label>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">API Keys</span>
        <label class="toggle-switch">
          <input type="checkbox" id="pattern-apikey" checked />
          <span class="toggle-slider"></span>
        </label>
      </label>
      <label class="toggle-row">
        <span class="toggle-label">IP Addresses</span>
        <label class="toggle-switch">
          <input type="checkbox" id="pattern-ip" checked />
          <span class="toggle-slider"></span>
        </label>
      </label>
    </div>

    <div class="section">
      <div class="section-title">Data</div>
      <button class="btn btn-danger" id="clear-logs">Clear All Logs</button>
    </div>

    <a href="#" class="privacy-link">Privacy Policy</a>

    <script src="options.js"></script>
  </body>
</html>
